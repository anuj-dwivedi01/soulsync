{% extends "base.html" %}

{% block content %}
<div class="session-container" style="max-width: 700px; margin: 0 auto; width: 100%;">
    
    <div id="roundBanner" style="display: none;"></div>

    <div class="top-bar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; color: #a1a1aa;">
        <span id="progressText" style="font-weight: 600; letter-spacing: 1px; text-align: left;">Loading...</span>
        
        <div class="sync-indicator" style="display: flex; align-items: center; gap: 0.5rem;">
            <div style="width: 10px; height: 10px; background: var(--color-emerald); border-radius: 50%; box-shadow: 0 0 10px var(--color-emerald);"></div>
            <span style="font-size: 0.9rem;">Live Sync</span>
        </div>
    </div>

    <div class="glass-panel" id="questionCard" style="padding: 3rem 2rem; border-radius: 20px; border: 1px solid var(--glass-border); background: var(--glass-bg); backdrop-filter: blur(12px); text-align: center; opacity: 0; transform: translateY(10px);">
        
        <h2 id="questionText" style="font-size: 1.8rem; font-weight: 600; margin-bottom: 2.5rem; line-height: 1.4;">
            Waiting for partner to sync...
        </h2>

        <div id="optionsContainer" style="display: flex; flex-direction: column; gap: 1rem;"></div>
    </div>
    
    <p id="waitingStatus" style="text-align: center; margin-top: 2rem; color: var(--color-purple); display: none; font-weight: 500;">
        Waiting for partner to answer...
    </p>
</div>

<script>
    const socket = io();
    const roomCode = "{{ room.room_code }}";
    const userId = "{{ user_id }}";
    
    let currentQuestionId = null;

    socket.on('connect', () => {
        socket.emit('request_question', { room_code: roomCode, user_id: userId });
    });

    socket.on('new_question', (data) => {
        currentQuestionId = data.question_id;
        
        // 1. Update Progress Tracker Text & Reset Status
        document.getElementById('progressText').innerText = `QUESTION ${data.current_index} / ${data.total_questions}`;
        document.getElementById('waitingStatus').style.display = 'none';
        
        // 2. Inject the Glowing Instruction AND Question Text directly into the card
        const questionElement = document.getElementById('questionText');
        let instructionHTML = "";
        
        if (data.question_type === 'prediction') {
            instructionHTML = `
                <div style="background: rgba(236, 72, 153, 0.2); border: 1px solid #ec4899; color: #fbcfe8; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1.5rem; display: inline-block; box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);">
                    🔮 Answer for your partner: What will THEY choose?
                </div><br>
            `;
        } else {
            instructionHTML = `
                <div style="background: rgba(16, 185, 129, 0.2); border: 1px solid #10b989; color: #a7f3d0; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1.5rem; display: inline-block;">
                    ⚡ Answer for yourself: Be brutally honest.
                </div><br>
            `;
        }

        // Set the HTML once using the correct Python backend variable
        questionElement.innerHTML = instructionHTML + data.question_text;

        // Hide the old external banner just in case
        document.getElementById('roundBanner').style.display = 'none';

        // 3. Populate Options Buttons
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        data.options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = "option-btn";
            btn.style.cssText = `
                width: 100%; padding: 1.2rem; background: rgba(255,255,255,0.04); 
                border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; 
                color: white; font-size: 1.1rem; cursor: pointer; transition: all 0.2s ease;
                text-align: left;
            `;
            btn.onmouseover = () => btn.style.background = "rgba(255,255,255,0.08)";
            btn.onmouseout = () => btn.style.background = "rgba(255,255,255,0.04)";
            btn.onclick = () => selectOption(btn, opt);
            container.appendChild(btn);
        });

        // Trigger the smooth animation for the new question
        gsap.to("#questionCard", { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" });
    });

    function selectOption(clickedBtn, selectedAnswer) {
        lockAllButtons();

        if (clickedBtn) {
            clickedBtn.style.opacity = "1";
            clickedBtn.style.border = "1px solid var(--color-purple)";
            clickedBtn.style.background = "rgba(139, 92, 246, 0.2)";
        }

        document.getElementById('waitingStatus').style.display = 'block';
        document.getElementById('waitingStatus').innerText = "Answer locked. Waiting for partner...";
        document.getElementById('waitingStatus').style.color = "var(--color-purple)";

        socket.emit('submit_answer', {
            room_code: roomCode,
            user_id: userId,
            question_id: currentQuestionId,
            answer: selectedAnswer
        });
    }

    function lockAllButtons() {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => {
            b.disabled = true;
            b.style.opacity = "0.4";
            b.style.cursor = "not-allowed";
        });
    }

    socket.on('round_complete', () => {
        document.getElementById('waitingStatus').innerText = "Both locked in! Syncing data matrix...";
        document.getElementById('waitingStatus').style.color = "var(--color-emerald)";
        setTimeout(() => {
            socket.emit('request_question', { room_code: roomCode, user_id: userId });
        }, 1500);
    });

    socket.on('test_complete', (data) => {
        document.getElementById('questionCard').innerHTML = `<h2 style="color: var(--color-emerald); font-size: 2rem;">${data.message}</h2><p style='margin-top:1rem;color:#a1a1aa;'>Compiling psychological report...</p>`;
        setTimeout(() => {
            window.location.href = `/results/${roomCode}?user_id=${userId}`;
        }, 2000);
    });
</script>
{% endblock %}
