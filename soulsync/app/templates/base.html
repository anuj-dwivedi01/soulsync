<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync | Not just compatibility. Understanding.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>

    <style>
        /* Google Translate Custom CSS */
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
        body { top: 0px !important; } 
        .goog-te-gadget { color: transparent !important; font-size: 0px !important; }
        
        .goog-te-combo {
            color: white !important;
            background-color: rgba(139, 92, 246, 0.2) !important;
            border: 1px solid rgba(139, 92, 246, 0.5) !important;
            border-radius: 8px !important;
            padding: 8px 12px !important;
            font-family: 'system-ui', sans-serif !important;
            font-size: 14px !important;
            cursor: pointer;
            backdrop-filter: blur(10px);
            outline: none;
            transition: all 0.3s ease;
        }

        .goog-te-combo:hover {
            border-color: rgba(139, 92, 246, 0.8) !important;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        /* Disable Google's annoying hover tooltips */
        .goog-tooltip { display: none !important; }
        .goog-tooltip:hover { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }
        
        .goog-te-combo option {
            background-color: #0f0f13 !important;
            color: #ffffff !important;
            font-weight: 600 !important;
        }
    </style>
</head>
<body>
    
    <nav style="position: absolute; top: 0; left: 0; width: 100%; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: flex-start; box-sizing: border-box; z-index: 100;">
        <a href="/" style="text-decoration: none;">
            <h1 style="
                font-size: 1.8rem; 
                font-weight: 900; 
                letter-spacing: 2px; 
                margin: 0;
                background: linear-gradient(135deg, #c084fc, #8b5cf6); 
                -webkit-background-clip: text; 
                background-clip: text; 
                -webkit-text-fill-color: transparent;">
                SoulSync
            </h1>
        </a>
        
        <div id="custom-translate-container">
            <div id="google_translate_element"></div>
        </div>
    </nav>

    <canvas id="ambientCanvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none;"></canvas>
    <div class="ambient-background"></div>

    <main class="app-container">
        {% block content %}{% endblock %}
    </main>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en', 
                includedLanguages: 'hi,mr,ta,te,gu,bn,kn,ml,pa,en'
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        gsap.from("main", { opacity: 0, y: 20, duration: 1, ease: "power3.out" });

        const canvas = document.getElementById('ambientCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: Math.random() * 2 + 1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(139, 92, 246, 0.4)';
                ctx.fill();

                for (let j = index + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(139, 92, 246, ${1 - dist/150})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
